<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PH Simulation Engine - Smoke Tests</title>
  <style>
    body { font-family: Inter, system-ui, Arial, sans-serif; margin: 24px; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 1.2rem; }
    .ok { color: #22c55e; }
    .fail { color: #ef4444; }
    pre { background: #111827; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Predictive History — Smoke Tests (engine + adapter UI)</h1>
  <div id="results"></div>
  <pre id="log"></pre>

  <script src="./engine.js"></script>
  <script type="module">
    import { createPHAdapter } from "../js/sim-adapter.js";

    async function loadSeed() {
      const res = await fetch('./seed.json');
      if (!res.ok) throw new Error('Falha ao carregar seed.json');
      return res.json();
    }

    function makeV3SeedFromV1(v1) {
      return {
        meta: { ...(v1.meta || {}), version: '3.0.0' },
        entities: {
          players: (v1.players || []).map((p) => ({ ...p, attrs: { power: p.power, cohesion: p.cohesion, legitimacy: p.legitimacy, resourceBase: p.resourceBase } })),
          groups: (v1.groups || []).map((g) => ({ ...g, trust: g.trustInstitutions, weight: g.size })),
          relations: (v1.relations || []).map((r) => ({ ...r, from: r.source, to: r.target }))
        },
        layers: {
          people: (v1.groups || []).map((g) => ({ id: g.id, label: g.name, region: 'groups', grievance: g.grievance, mobilization: g.mobilization, trustInstitutions: g.trustInstitutions })),
          supernodes: (v1.players || []).map((p) => ({ id: p.id, label: p.name, region: p.type, power: p.power, cohesion: p.cohesion, legitimacy: p.legitimacy, resourceBase: p.resourceBase })),
          blocks: (v1.relations || []).map((r, idx) => ({ id: `b-${idx}`, label: `${r.source} -> ${r.target}`, region: r.type, influence: r.influence, volatility: r.volatility }))
        },
        events: v1.events,
        context: { macro: v1.macro }
      };
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    function in01(v) {
      return typeof v === 'number' && v >= 0 && v <= 1;
    }

    function print(line) {
      document.getElementById('log').textContent += line + '\n';
    }

    async function run() {
      const results = document.getElementById('results');
      let pass = 0;
      let fail = 0;

      function report(name, fn) {
        try {
          fn();
          const p = document.createElement('p');
          p.className = 'ok';
          p.textContent = '✅ ' + name;
          results.appendChild(p);
          pass++;
        } catch (err) {
          const p = document.createElement('p');
          p.className = 'fail';
          p.textContent = '❌ ' + name + ' -> ' + err.message;
          results.appendChild(p);
          fail++;
        }
      }

      const seed = await loadSeed();
      const sim = PHSim.createSimulator(seed, { rngSeed: 42 });

      report('Instancia simulador', () => {
        assert(typeof sim.step === 'function', 'sim.step ausente');
        assert(typeof sim.run === 'function', 'sim.run ausente');
      });

      const frame = sim.step();
      report('step() retorna KPIs válidos', () => {
        assert(frame && frame.kpis, 'frame/kpis ausente');
        assert(in01(frame.kpis.riskConflict), 'riskConflict fora de faixa');
        assert(in01(frame.kpis.institutionalStability), 'institutionalStability fora de faixa');
        assert(in01(frame.kpis.polarization), 'polarization fora de faixa');
        assert(in01(frame.kpis.economicResilience), 'economicResilience fora de faixa');
      });

      report('Monte Carlo retorna intervalo de confiança', () => {
        const mc = PHSim.monteCarlo(seed, { runs: 30, steps: 6, baseSeed: 100 });
        const k = mc.summary.riskConflict;
        assert(k && k.ci, 'ci ausente');
        assert(in01(k.ci.lower) && in01(k.ci.upper), 'IC fora de faixa [0,1]');
        assert(k.ci.lower <= k.ci.upper, 'IC invertido');
      });

      const adapter = await createPHAdapter({ seedUrl: './seed.json' });
      const f0 = adapter.getFrame(0);
      const f3 = adapter.getFrame(3);
      const drivers = adapter.getDrivers(f3);
      const net = adapter.getNetwork(f3, 'people', { riskThreshold: 0, query: '' });
      const why = adapter.getWhyRiskMoved(f3, f0);
      const causal = adapter.getCausalTimeline(3);
      const scenarioFrame = adapter.getFrameForScenario(3, { presetId: 'war', intensity: 80, scope: 'global' });

      const seedV3 = makeV3SeedFromV1(seed);
      const simV3 = PHSim.createSimulator(seedV3, { rngSeed: 11 });
      const frameV3 = simV3.step();

      report('Adapter cria frames sem dados mockados', () => {
        assert(f0 && f3, 'frames ausentes');
        assert(typeof f3.score === 'number', 'score inválido');
        assert(Array.isArray(f3.events), 'events inválido');
      });

      report('Adapter expõe drivers, explainability e rede', () => {
        assert(Array.isArray(drivers) && drivers.length > 0, 'drivers vazio');
        assert(Array.isArray(net) && net.length > 0, 'rede vazia');
        assert(why && typeof why.summary === 'string' && why.summary.length > 0, 'whyRiskMoved inválido');
        assert(Array.isArray(why.chain) && why.chain.length >= 1, 'cadeia causal inválida');
        assert(Array.isArray(causal) && causal.length >= 1, 'causal timeline vazia');
      });

      report('Adapter aplica cenário/compare frame', () => {
        assert(scenarioFrame && scenarioFrame.kpis, 'scenarioFrame ausente');
        assert(in01(scenarioFrame.kpis.riskConflict), 'scenario riskConflict fora de faixa');
        assert((scenarioFrame.events || []).length >= (f3.events || []).length, 'cenário não adicionou evento');
      });

      report('Engine aceita seed V3 (entities/layers)', () => {
        assert(frameV3 && frameV3.kpis, 'frame V3 ausente');
        assert(in01(frameV3.kpis.riskConflict), 'riskConflict V3 fora de faixa');
      });

      const adapterV3 = await createPHAdapter({
        apiClient: {
          isEnabled: () => true,
          health: async () => ({ ok: true }),
          getSeed: async () => seedV3
        }
      });
      const f1v3 = adapterV3.getFrame(1);
      const netBlocksV3 = adapterV3.getNetwork(f1v3, 'blocks', { riskThreshold: 0, query: '' });

      report('Adapter processa V3 e layers de network', () => {
        assert(Array.isArray(netBlocksV3), 'network V3 inválida');
        assert(netBlocksV3.length > 0, 'network blocks V3 vazia');
      });

      print('Passou: ' + pass + ' | Falhou: ' + fail);
      print('Resumo KPI (sim):');
      print(JSON.stringify(sim.computeKpis(), null, 2));
    }

    run().catch((err) => {
      const p = document.createElement('p');
      p.className = 'fail';
      p.textContent = 'Erro fatal nos testes: ' + err.message;
      document.getElementById('results').appendChild(p);
      print(err.stack || String(err));
    });
  </script>
</body>
</html>
