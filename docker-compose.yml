services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: ph-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-predictive_history}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ph_db_data:/home/postgres/pgdata/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ph-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-predictive_history}
      APP_ENV: ${APP_ENV:-dev}
      ADMIN_DELETE_TOKEN: ${ADMIN_DELETE_TOKEN:-change-me}
      DOCS_ROOT_PATH: ${DOCS_ROOT_PATH:-/data/docs}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173","https://danielharagao.github.io","https://danhausch.cloud"]}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-https://.*\\.github\\.io}
    volumes:
      - ./docs:/data/docs
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db

volumes:
  ph_db_data:
